name: Cargo Dependency Reviews
description: Audit changed external Cargo dependencies and publish Reviews packets.

inputs:
  anthropic-api-key:
    description: Anthropic API key for Claude Code.
    required: true
  reviews-api-key:
    description: Reviews API key used by the Reviews CLI.
    required: true
  reviews-server-url:
    description: Reviews server URL.
    required: false
    default: https://reviews-dev.fly.dev
  github-token:
    description: GitHub token used to create or update the PR comment.
    required: true
  lockfile:
    description: Path to the Cargo.lock file, relative to the repository root.
    required: false
    default: Cargo.lock
  base-ref:
    description: Base git ref or SHA. Defaults to pull_request.base.sha or HEAD~1.
    required: false
    default: ""
  head-ref:
    description: Head git ref or SHA. Defaults to pull_request.head.sha or HEAD.
    required: false
    default: ""
  comment-on-pr:
    description: Whether to create or update a sticky PR comment.
    required: false
    default: "true"
  pr-number:
    description: Pull request number to comment on when the workflow is manually triggered.
    required: false
    default: ""
  reviews-cli-version:
    description: Reviews CLI version to install.
    required: false
    default: 0.0.1-alpha.0
  claude-model:
    description: Claude Code model or alias. The default `sonnet` alias tracks the latest Sonnet model.
    required: false
    default: sonnet
  claude-args:
    description: Limited extra Claude Code CLI arguments. Only --max-turns, --max-budget-usd, --effort, --fallback-model, --betas, and --include-partial-messages are accepted.
    required: false
    default: ""

outputs:
  review-urls:
    description: JSON array of uploaded Reviews packet URLs.
    value: ${{ steps.comment.outputs.review-urls }}
  comment-url:
    description: URL of the sticky PR comment, when the action runs in a PR context and commenting is enabled.
    value: ${{ steps.comment.outputs.comment-url }}
  results-json:
    description: Workspace path to the machine-readable audit results JSON file.
    value: ${{ steps.comment.outputs.results-json }}

runs:
  using: composite
  steps:
    - name: Prepare dependency diffs
      id: prepare
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/prepare.py"
      env:
        INPUT_LOCKFILE: ${{ inputs.lockfile }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_HEAD_REF: ${{ inputs.head-ref }}

    - name: Upload dependency source artifacts
      if: ${{ steps.prepare.outputs.artifact-count != '0' }}
      uses: actions/upload-artifact@v4
      with:
        name: dep-review-new-sources-${{ github.run_id }}
        path: .dep-review-work/artifacts/*.tar.gz
        if-no-files-found: ignore

    - name: Install Claude Code CLI
      if: ${{ steps.prepare.outputs.dependency-count != '0' }}
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    - name: Audit dependency diffs and write Reviews packets
      id: claude
      if: ${{ steps.prepare.outputs.dependency-count != '0' }}
      shell: bash
      run: |
        set -euo pipefail
        umask 077
        temp_root="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
        mkdir -p "$temp_root"
        key_file="$(mktemp "$temp_root/dep-reviews-anthropic-key.XXXXXX")"
        cleanup() {
          rm -f "$key_file"
        }
        trap cleanup EXIT
        printf '%s' "$ANTHROPIC_API_KEY_INPUT" > "$key_file"
        unset ANTHROPIC_API_KEY_INPUT
        INPUT_ANTHROPIC_API_KEY_FILE="$key_file" python3 "$GITHUB_ACTION_PATH/scripts/run_claude.py"
      env:
        ANTHROPIC_API_KEY_INPUT: ${{ inputs.anthropic-api-key }}
        INPUT_CLAUDE_MODEL: ${{ inputs.claude-model }}
        INPUT_CLAUDE_ARGS: ${{ inputs.claude-args }}

    - name: Install and configure Reviews CLI
      id: setup-reviews
      if: ${{ steps.prepare.outputs.dependency-count != '0' }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/setup_reviews.py"
      env:
        INPUT_REVIEWS_API_KEY: ${{ inputs.reviews-api-key }}
        INPUT_REVIEWS_SERVER_URL: ${{ inputs.reviews-server-url }}
        INPUT_REVIEWS_CLI_VERSION: ${{ inputs.reviews-cli-version }}
        REVIEWS_VERSION: ${{ inputs.reviews-cli-version }}
        INSTALL_DIR: ${{ runner.temp }}/dep-review-reviews-bin

    - name: Upload Reviews packets
      if: ${{ steps.prepare.outputs.dependency-count != '0' }}
      shell: bash
      run: |
        set +e
        python3 "$GITHUB_ACTION_PATH/scripts/push_reviews.py"
        status="$?"
        mkdir -p .dep-review-work
        printf '%s\n' "$status" > .dep-review-work/upload-exit-code
        exit 0
      env:
        INPUT_REVIEWS_COMMAND: ${{ steps.setup-reviews.outputs.reviews-command }}

    - name: Comment on pull request
      id: comment
      if: ${{ always() }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/post_comment.py"
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_COMMENT_ON_PR: ${{ inputs.comment-on-pr }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}

    - name: Fail if dependency review failed
      if: ${{ always() && steps.prepare.outputs.dependency-count != '0' }}
      shell: bash
      run: |
        status=0
        if [ -f .dep-review-work/upload-exit-code ]; then
          status="$(cat .dep-review-work/upload-exit-code)"
        fi
        if [ "$status" != "0" ]; then
          echo "Dependency review completed with failures after publishing the PR comment."
          exit "$status"
        fi
