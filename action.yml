name: Cargo Dependency Reviews
description: Audit changed external Cargo dependencies and publish Reviews packets.

inputs:
  anthropic-api-key:
    description: Anthropic API key for Claude Code.
    required: true
  reviews-api-key:
    description: Reviews API key used by the Reviews CLI.
    required: true
  reviews-server-url:
    description: Reviews server URL.
    required: false
    default: https://reviews-dev.fly.dev
  github-token:
    description: GitHub token used to create or update the PR comment.
    required: true
  lockfile:
    description: Path to the Cargo.lock file, relative to the repository root.
    required: false
    default: Cargo.lock
  base-ref:
    description: Base git ref or SHA. Defaults to pull_request.base.sha or HEAD~1.
    required: false
    default: ""
  head-ref:
    description: Head git ref or SHA. Defaults to pull_request.head.sha or HEAD.
    required: false
    default: ""
  comment-on-pr:
    description: Whether to create or update a sticky PR comment.
    required: false
    default: "true"
  reviews-cli-version:
    description: Reviews CLI version to install.
    required: false
    default: 0.0.1-alpha.0
  claude-args:
    description: Extra arguments passed to Claude Code.
    required: false
    default: ""

outputs:
  review-urls:
    description: JSON array of uploaded Reviews packet URLs.
    value: ${{ steps.comment.outputs.review-urls }}
  comment-url:
    description: URL of the sticky PR comment, when the action runs in a PR context and commenting is enabled.
    value: ${{ steps.comment.outputs.comment-url }}
  results-json:
    description: Workspace path to the machine-readable audit results JSON file.
    value: ${{ steps.comment.outputs.results-json }}

runs:
  using: composite
  steps:
    - name: Prepare dependency diffs
      id: prepare
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/prepare.py"
      env:
        INPUT_LOCKFILE: ${{ inputs.lockfile }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_HEAD_REF: ${{ inputs.head-ref }}

    - name: Install and configure Reviews CLI
      id: setup-reviews
      if: ${{ steps.prepare.outputs.dependency-count != '0' }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/setup_reviews.py"
      env:
        INPUT_REVIEWS_API_KEY: ${{ inputs.reviews-api-key }}
        INPUT_REVIEWS_SERVER_URL: ${{ inputs.reviews-server-url }}
        INPUT_REVIEWS_CLI_VERSION: ${{ inputs.reviews-cli-version }}

    - name: Upload dependency source artifacts
      if: ${{ steps.prepare.outputs.artifact-count != '0' }}
      uses: actions/upload-artifact@v4
      with:
        name: dep-review-new-sources-${{ github.run_id }}
        path: .dep-review-work/artifacts/*.tar.gz
        if-no-files-found: ignore

    - name: Audit dependency diffs and publish Reviews packets
      id: claude
      if: ${{ steps.prepare.outputs.dependency-count != '0' }}
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        prompt: |
          You are auditing third-party Cargo dependency source changes prepared by this action.

          Load the Reviews skills from the added action directory, especially writing-review-packets and using-reviews-locally. Read .dep-review-work/manifest.json first.

          For each dependency entry in manifest.dependencies:
          1. cd into repo_path.
          2. Inspect git diff HEAD~1..HEAD carefully. Do not run dependency build scripts, tests, examples, or arbitrary dependency code.
          3. Perform a security review of the dependency source change. Pay particular attention to build.rs, proc macros, unsafe code, network/file/process execution, credential handling, dependency graph changes, generated code, platform-specific code, and obfuscated or minified content.
          4. Refine the provided packet_path markdown into a useful Reviews packet. Keep every changed line covered exactly once by @hunk references. Include the audit verdict, notable security findings, suspicious build script or proc-macro changes, and a guided walkthrough of the diff.
          5. Run: reviews push --title "Cargo dependency audit: <name> <change_label>" --description "Automated dependency source audit from GitHub Actions." --range HEAD~1..HEAD --packet <packet_path>
          6. Capture the Reviews URL and patchset number printed by the CLI.

          Write the final JSON result to manifest.results_path when finished with this exact shape:
          {
            "dependencies": [
              {
                "slug": "manifest slug",
                "status": "uploaded",
                "review_url": "https://...",
                "patchset_number": 1,
                "severity": "none|low|medium|high|critical",
                "audit_summary": "one concise sentence"
              }
            ]
          }

          If a dependency cannot be uploaded, include it with status "failed", an empty review_url, severity "unknown", and audit_summary explaining the failure.
        claude_args: |
          --add-dir "${{ github.action_path }}"
          --max-turns 25
          ${{ inputs.claude-args }}

    - name: Comment on pull request
      id: comment
      if: ${{ always() }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/post_comment.py"
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_COMMENT_ON_PR: ${{ inputs.comment-on-pr }}
